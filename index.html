<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Queer Stammtisch</title>
<link rel="stylesheet" href="style.css">
</head>

<body id="app">

<div id="home" class="screen">
    <h1>Welcome to our App!</h1>
    <h2>Please select your category:</h2>

    <div class="menu">
        <button onclick="openCategory('cat1')">friendly</button>
        <button onclick="openCategory('cat2')">hot</button>
        <button onclick="openCategory('cat3')">spicy</button>
    </div>

    <a class="corner left" href="https://sofra.cologne/spenden/" target="_blank">Donations for SOFRA</a>
    <a class="corner right" href="https://example.com" target="_blank">Link B</a>
</div>

<div id="category" class="screen hidden">
    <div class="card" id="cardText"></div>

    <div class="controls">
        <button onclick="newItem()">Neu</button>
        <button onclick="goHome()">Zurück</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
