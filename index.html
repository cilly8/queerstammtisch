<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Queer Stammtisch</title>
<link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
</head>

<body id="app">

<div id="home" class="screen">
    <h1 class="h1">Welcome to our<br>I KISSED A GIRL</h1>
    <h2 class="h2">@ Queerer Stammtisch</h2>
    <h3 class="h3">App!<br>Please select a category:</h3>

    <div class="menu">
        <button onclick="openCategory('cat1')">friendly</button>
        <button onclick="openCategory('cat2')">hot</button>
        <button onclick="openCategory('cat3')">spicy</button>
        <!-- <button onclick="openCategory('cat4')">F*ck, Marry, Kill</button>
        <button onclick="openCategory('cat5')">Truth or Dare</button> !-->
    </div>

    <a class="corner left" href="https://sofra.cologne/spenden/" target="_blank">Donate</a>
    <button class= "corner right" onclick="openCategory('feedback')">Feedback?</button>
    <a class="logo" href="https://linktr.ee/QueererStammtisch"></a>
    <a href="https://linktr.ee/QueererStammtisch" id="circle-link">
        <div id="circle"></div>
    </a>
    <a href="javascript:void(0)" id="circle-link2" onclick="openCategory('feedback')">
        <div id="circle2"></div>
    </a>

</div>

<div id="category" class="screen hidden">
    <div class="card" id="cardText"></div>

    <div class="controls">
        <button onclick="newItem()">Next</button>
        <button onclick="goHome()">Home</button>
    </div>
</div>



<div id="feedback" class="screen hidden feedback-bg">
    <h2>Send Feedback</h2>

    <textarea id="feedbackText" placeholder="Your feedback..."></textarea>

    <div class="controls">
        <button onclick="sendFeedback()">Send</button>
        <button onclick="goHome()">Home</button>
    </div>

    <p id="status"></p>
</div>



<!-- ZUERST EmailJS laden -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<!-- DANN dein eigenes Script -->
<script src="script.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">

</body>
</html>
