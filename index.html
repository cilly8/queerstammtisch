<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Queer Stammtisch</title>
<link rel="stylesheet" href="style.css">

</head>

<body id="app">

<div id="home" class="screen">
    <h1 class="h1">Welcome to our<br>I KISSED A GIRL</h1>
    <h2 class="h2">@Queer Stammtisch</h2>
    <h3 class="h3">App!<br>Please select a category:</h3>

    <div class="menu">
        <button onclick="openCategory('cat1')">friendly</button>
        <button onclick="openCategory('cat2')">hot</button>
        <button onclick="openCategory('cat3')">spicy</button>
    </div>

    <a class="corner left" href="https://sofra.cologne/spenden/" target="_blank">Donate</a>
    <button class= "corner right" onclick="openCategory('feedback')">Feedback?</button>
    <a class="logo" href="https://sofra.cologne/spenden/"></a>
</div>

<div id="category" class="screen hidden">
    <div class="card" id="cardText"></div>

    <div class="controls">
        <button onclick="newItem()">Next</button>
        <button onclick="goHome()">Home</button>
    </div>
</div>



<div id="feedback" class="screen hidden feedback-bg">
    <h2>Feedback senden</h2>

    <textarea id="feedbackText" placeholder="Dein Feedback..."></textarea>

    <div class="controls">
        <button onclick="sendFeedback()">Senden</button>
        <button onclick="goHome()">Zurück</button>
    </div>

    <p id="status"></p>
</div>

<!-- ZUERST EmailJS laden -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<!-- DANN dein eigenes Script -->
<script src="script.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">

</body>
</html>
